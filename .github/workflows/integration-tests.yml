name: Integration Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  integration-tests:
    name: MCP Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build MCP server
        run: cargo build --release

      - name: Run unit and integration tests
        run: cargo test --release
        env:
          RUST_LOG: info

      - name: Test MCP server binary
        run: |
          test -x target/release/rag-mcp
          echo "MCP server binary exists"

          ./target/release/rag-mcp --help
          echo "MCP server help command works"

      - name: Test MCP server startup
        run: |
          response=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-test","version":"0.1.0"}}}' \
            | timeout 10s ./target/release/rag-mcp serve 2>/dev/null || true)

          if echo "$response" | grep -q '"result"'; then
            echo "MCP server responded to initialize request"
          else
            echo "WARNING: Could not verify initialize response (server may have exited on stdin EOF)"
            echo "Response was: $response"
          fi

      - name: Test error handling
        run: |
          if ! ./target/release/rag-mcp serve --data-dir /nonexistent 2>/dev/null; then
            echo "Error handling works correctly"
          else
            echo "Error handling failed"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          pkill -f rag-mcp || true
